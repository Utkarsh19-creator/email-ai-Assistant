<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Email Assistant Dashboard</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h2 {
            color: #2c3e50;
            border-bottom: 2px solid #ecf0f1;
            padding-bottom: 10px;
            margin-top: 0;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #34495e;
        }
        input[type="text"], textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 14px;
        }
        textarea {
            resize: vertical;
            height: 150px;
        }
        button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #2980b9;
        }
        .result-box {
            margin-top: 25px;
            padding: 20px;
            background-color: #fcfcfc;
            border-left: 5px solid #2ecc71;
            border-radius: 4px;
            display: none;
        }
        .result-box h3 {
            margin-top: 0;
            color: #27ae60;
        }
        .reply-content {
            white-space: pre-wrap;
            background: #fff;
            padding: 15px;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            font-family: Consolas, Monaco, monospace;
        }
        .loading {
            display: none;
            color: #7f8c8d;
            font-style: italic;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>📩 AI Email Assistant Draft Generator</h2>

    <div class="form-group">
        <label for="sender">Sender Email Address:</label>
        <input type="text" id="sender" placeholder="e.g., student.name@aktu.edu">
    </div>

    <div class="form-group">
        <label for="subject">Email Subject:</label>
        <input type="text" id="subject" placeholder="e.g., Requesting extension for Lab Assignment">
    </div>

    <div class="form-group">
        <label for="body">Incoming Email Body:</label>
        <textarea id="body" placeholder="Paste the content of the received email here..."></textarea>
    </div>

    <button onclick="generateDraftReply()">Generate Response with Gemini 2.5</button>

    <div id="loading" class="loading">Thinking... Processing email layout through Gemini API...</div>

    <div id="resultBox" class="result-box">
        <h3>✨ Gemini Generated Reply Draft:</h3>
        <div id="replyOutput" class="reply-content"></div>
    </div>
</div>

<script>
    async function generateDraftReply() {
        const sender = document.getElementById('sender').value;
        const subject = document.getElementById('subject').value;
        const body = document.getElementById('body').value;

        const loadingText = document.getElementById('loading');
        const resultBox = document.getElementById('resultBox');
        const replyOutput = document.getElementById('replyOutput');

        // Validation
        if(!sender || !subject || !body) {
            alert('Please fill out all fields before submitting.');
            return;
        }

        // UI Visual Update
        loadingText.style.display = 'block';
        resultBox.style.display = 'none';

        const payload = { sender, subject, body };

        try {
            const response = await fetch('/api/emails/reply', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(payload)
            });

            if (!response.ok) {
                throw new Error(`Server Error: ${response.statusText}`);
            }

            const data = await response.json();

            // Show result
            replyOutput.textContent = data.generatedReply;
            resultBox.style.display = 'block';
        } catch (error) {
            alert('An error occurred while calling the API: ' + error.message);
            console.error(error);
        } finally {
            loadingText.style.display = 'none';
        }
    }
</script>

</body>
</html>
